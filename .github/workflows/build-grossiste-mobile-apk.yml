name: Build APK LiviPro Grossiste Mobile

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (Grossiste Mobile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Debug - vérifier structure
        run: |
          echo "=== Node ===" && node --version
          echo "=== pnpm ===" && pnpm --version
          echo "=== Répertoires artifacts ===" && ls artifacts/ || echo "VIDE"
          echo "=== grossiste-mobile ===" && ls artifacts/grossiste-mobile/ || echo "ABSENT"

      - name: Install deps
        run: |
          echo "Démarrage pnpm install..."
          pnpm install --no-frozen-lockfile
          echo "pnpm install OK"

      - name: Build web app
        working-directory: artifacts/grossiste-mobile
        env:
          PORT: "3000"
          BASE_PATH: /grossiste-mobile/
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL || 'https://workspace.mamadouelimaned.replit.app' }}
        run: |
          echo "Démarrage vite build..."
          pnpm run build
          echo "Build OK - contenu dist:"
          ls dist/public/ || echo "Pas de dist/public"

      - name: Init Capacitor + Sync Android
        working-directory: artifacts/grossiste-mobile
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build APK avec Gradle
        working-directory: artifacts/grossiste-mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiviPro-Grossiste-Mobile-APK
          path: artifacts/grossiste-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
