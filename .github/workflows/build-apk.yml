name: Build APK LiviPro Distri

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Créer les assets manquants
        working-directory: artifacts/livreur-app
        run: |
          cp assets/images/icon.png assets/images/adaptive-icon.png
          echo "✅ adaptive-icon.png créé depuis icon.png"

      - name: Expo prebuild
        working-directory: artifacts/livreur-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK avec Gradle
        working-directory: artifacts/livreur-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiviPro-Distri-APK
          path: artifacts/livreur-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
