name: Build APK LiviPro Distri

on:
  push:
    branches: [main]
    paths:
      - "artifacts/livreur-app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profil de build EAS"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK (LiviPro Distri)
        working-directory: artifacts/livreur-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --output ./livipro-distri.apk
        continue-on-error: false

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiviPro-Distri-APK
          path: artifacts/livreur-app/livipro-distri.apk
          retention-days: 30

      - name: Create GitHub Release (production only)
        if: github.event.inputs.profile == 'production'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: LiviPro Distri v${{ github.run_number }}
          files: artifacts/livreur-app/livipro-distri.apk
          body: |
            ## LiviPro Distri - App Livreur

            APK Android générée automatiquement depuis la branche main.

            ### Installation
            1. Télécharger le fichier `livipro-distri.apk`
            2. Activer "Sources inconnues" dans les paramètres Android
            3. Installer l'APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
