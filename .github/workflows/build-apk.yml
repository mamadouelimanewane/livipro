name: Build APK LiviPro Distri

on:
  push:
    branches: [main]
    paths:
      - "artifacts/livreur-app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK Android (sans EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project (expo prebuild)
        working-directory: artifacts/livreur-app
        env:
          EXPO_PUBLIC_DOMAIN: ${{ secrets.PROD_API_URL || 'https://livi-pro-admin.replit.app' }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/livreur-app/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/livreur-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/livreur-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiviPro-Distri-APK
          path: artifacts/livreur-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          APK_SIZE=$(du -h artifacts/livreur-app/android/app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | cut -f1 || echo "N/A")
          echo "## ✅ APK LiviPro Distri généré" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Taille:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Télécharger:** Onglet **Artifacts** ci-dessus → \`LiviPro-Distri-APK\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation:** Activer *Sources inconnues* sur Android, puis installer l'APK." >> $GITHUB_STEP_SUMMARY
