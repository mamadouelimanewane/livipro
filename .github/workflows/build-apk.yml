name: Build APK LiviPro Distri

on:
  push:
    branches: [main]
    paths:
      - "artifacts/livreur-app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profil de build EAS"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK (LiviPro Distri)
        id: eas-build
        working-directory: artifacts/livreur-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive
        continue-on-error: false

      - name: Get APK download URL
        id: get-apk-url
        working-directory: artifacts/livreur-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          APK_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d[0]?.artifacts?.buildUrl || '')")
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "APK URL: $APK_URL"

      - name: Download APK
        if: steps.get-apk-url.outputs.apk_url != ''
        run: |
          curl -L "${{ steps.get-apk-url.outputs.apk_url }}" -o livipro-distri.apk
          echo "APK downloaded: $(du -h livipro-distri.apk | cut -f1)"

      - name: Upload APK as GitHub artifact
        if: steps.get-apk-url.outputs.apk_url != ''
        uses: actions/upload-artifact@v4
        with:
          name: LiviPro-Distri-APK
          path: livipro-distri.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## Build APK LiviPro Distri" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build terminé avec succès" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Télécharger l'APK:** ${{ steps.get-apk-url.outputs.apk_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ou via l'onglet **Artifacts** de ce workflow." >> $GITHUB_STEP_SUMMARY
