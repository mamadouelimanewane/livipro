name: Build APK LiviPro Boutiquier

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm --filter @workspace/boutiquier-app build
        env:
          PORT: "3000"
          BASE_PATH: /boutiquier/
          NODE_ENV: production

      - name: Capacitor sync
        working-directory: artifacts/boutiquier-app
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Gradle APK
        working-directory: artifacts/boutiquier-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: LiviPro-Boutiquier-APK
          path: artifacts/boutiquier-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
