name: Build APK LiviPro Boutiquier

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (Boutiquier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Debug - vérifier structure
        run: |
          echo "=== Node ===" && node --version
          echo "=== pnpm ===" && pnpm --version
          echo "=== Répertoires artifacts ===" && ls artifacts/ || echo "VIDE"
          echo "=== boutiquier-app ===" && ls artifacts/boutiquier-app/ || echo "ABSENT"

      - name: Install deps
        run: |
          echo "Démarrage pnpm install..."
          pnpm install --no-frozen-lockfile
          echo "pnpm install OK"

      - name: Build web app
        working-directory: artifacts/boutiquier-app
        env:
          PORT: "3000"
          BASE_PATH: /boutiquier/
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL || 'https://livi-pro-admin.replit.app' }}
        run: |
          echo "Démarrage vite build..."
          pnpm run build
          echo "Build OK - contenu dist:"
          ls dist/public/ || echo "Pas de dist/public"

      - name: Init Capacitor + Sync Android
        working-directory: artifacts/boutiquier-app
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build APK avec Gradle
        working-directory: artifacts/boutiquier-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiviPro-Boutiquier-APK
          path: artifacts/boutiquier-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
